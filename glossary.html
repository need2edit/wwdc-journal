<script>
const glossary = JSON.parse(document.getElementById('glossary-data').textContent);

const YEAR_COLORS = {
  2014:'#f59e0b', 2015:'#84cc16', 2016:'#14b8a6', 2017:'#f97316',
  2018:'#ec4899', 2019:'#06b6d4', 2020:'#ef4444', 2021:'#a78bfa',
  2022:'#f87171', 2023:'#22d3ee', 2024:'#fb923c', 2025:'#c084fc',
};

const state = { search: '', cat: 'all', sort: 'mentions' };

function passes(t) {
  if (state.cat !== 'all' && t.category !== state.cat) return false;
  if (state.search && !t.term.toLowerCase().includes(state.search.toLowerCase())
      && !t.definition.toLowerCase().includes(state.search.toLowerCase())) return false;
  return true;
}

function renderFilters() {
  const cats = [...new Set(glossary.map(t => t.category))].sort();
  document.getElementById('cat-filter').innerHTML =
    `<button class="filter-chip ${state.cat==='all'?'active':''}" onclick="setCat('all')">All</button>` +
    cats.map(c => `<button class="filter-chip ${state.cat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  document.getElementById('sort-filter').innerHTML = [
    ['mentions','Most mentions'], ['breadth','Most years'], ['recent','Newest first'], ['alpha','A–Z'],
  ].map(([k, label]) =>
    `<button class="filter-chip ${state.sort===k?'active':''}" onclick="setSort('${k}')">${label}</button>`
  ).join('');
}

function setCat(c) { state.cat = c; renderFilters(); render(); }
function setSort(s) { state.sort = s; renderFilters(); render(); }

function sortFn(a, b) {
  if (state.sort === 'mentions') return b.total_mentions - a.total_mentions;
  if (state.sort === 'breadth') return b.year_count - a.year_count || b.total_mentions - a.total_mentions;
  if (state.sort === 'recent') return b.first_seen - a.first_seen || b.total_mentions - a.total_mentions;
  if (state.sort === 'alpha') return a.term.localeCompare(b.term);
  return 0;
}

function render() {
  const filtered = glossary.filter(passes).sort(sortFn);
  const out = document.getElementById('glossary-grid');
  if (filtered.length === 0) {
    out.innerHTML = `<div class="empty">No terms match these filters.</div>`;
    return;
  }
  out.innerHTML = filtered.map(t => termHTML(t)).join('');
}

function termHTML(t) {
  const yearChips = t.years_seen.map(y =>
    `<a class="term-year-chip" href="index-${y}.html" style="color:${YEAR_COLORS[y]};border:1px solid ${YEAR_COLORS[y]}33">${String(y).slice(-2)}</a>`
  ).join('');
  return `<div class="term-card">
    <div class="term-name">${escHtml(t.term)}</div>
    <span class="term-cat cat-${t.category}">${t.category}</span>
    <div class="term-def">${escHtml(t.definition)}</div>
    <div class="term-stats">
      <span class="term-stat"><strong>${t.total_mentions}</strong> mentions</span>
      <span class="term-stat"><strong>${t.year_count}</strong> years</span>
      <span class="term-stat">First: <strong>${t.first_seen}</strong></span>
    </div>
    <div class="term-years">${yearChips}</div>
  </div>`;
}

function escHtml(s) { return String(s).replace(/[<>&'"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&#39;','"':'&quot;'}[c])); }

document.getElementById('search-input').addEventListener('input', e => { state.search = e.target.value; render(); });

renderFilters();
render();
</script>
</body>
</html>
